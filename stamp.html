<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I AM : JEONJU - 스탬프 투어</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['Gowun Batang', 'serif'],
                        sans: ['Noto Sans KR', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen relative overflow-x-hidden pb-20">

    <canvas id="particle-bg"></canvas>

    <!-- Scroll Progress -->
    <div id="scroll-progress"></div>

    <!-- [NAVIGATION] -->
    <nav class="sticky top-0 z-40 bg-[#F1F5F2]/90 backdrop-blur-md border-b border-[var(--card-border)] py-4 px-6">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <a href="index.html" class="font-serif font-bold text-lg tracking-widest text-[var(--accent-color)]">
                I AM : JEONJU
            </a>
            <div class="flex flex-wrap gap-1 md:gap-2 justify-end">
                <a href="index.html" class="nav-btn-inactive">🌿 여행 스팟</a>
                <a href="stamp.html" class="nav-btn-active">🎯 스탬프 투어</a>
                <a href="test.html" class="nav-btn-inactive">📋 여행 테스트</a>
                <a href="guestbook.html" class="nav-btn-inactive">✍️ 방명록</a>
            </div>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto px-6 py-12">
        <div class="text-center pt-8 pb-12">
            <span class="text-xs uppercase tracking-widest font-bold text-[var(--accent-color)] px-3.5 py-1.5 rounded-full bg-[var(--accent-color)]/10 inline-block mb-4">
                STAMP TOUR
            </span>
            <h2 class="font-serif text-3xl md:text-4xl font-bold text-[var(--text-main)] mb-3">🎯 전주 OX 퀴즈 스탬프 도감</h2>
            <p class="text-xs md:text-sm opacity-80 text-[var(--text-muted)]">설명을 읽고 맞는지 틀리는지 골라 전주 로컬 가이드 지도 위에 도장을 수집해 보세요!</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">

            <!-- 왼쪽: 도감 현황 지도 판넬 -->
            <div class="lg:col-span-5 bg-[var(--card-bg)] border border-[var(--card-border)] p-6 rounded-3xl card-shadow">
                <h4 class="font-serif text-lg font-bold mb-4 flex justify-between items-center pb-2 border-b">
                    <span>🗺️ 나의 가상 전주 지도</span>
                    <span id="stamp-progress" class="text-xs font-sans text-[var(--accent-color)] font-bold">0 / 9 수집</span>
                </h4>

                <div class="grid grid-cols-3 gap-4" id="stamp-board"></div>

                <div class="mt-6 text-center">
                    <button onclick="resetStampTour()" class="text-[10px] text-red-500 font-bold opacity-60 hover:opacity-100 hover:underline transition-all">
                        스탬프 도감 전체 초기화
                    </button>
                </div>
            </div>

            <!-- 오른쪽: OX 퀴즈 플레이 판넬 -->
            <div class="lg:col-span-7 bg-[var(--card-bg)] border border-[var(--card-border)] p-8 rounded-3xl card-shadow">
                <h4 class="font-serif text-xl font-bold mb-6 text-[var(--accent-color)]">🧩 오늘의 OX 문제</h4>

                <div class="mb-6">
                    <label class="block text-xs font-bold text-[var(--text-muted)] mb-2">도전할 장소 고르기</label>
                    <select id="quiz-spot-select" onchange="loadQuiz()" class="w-full bg-[var(--bg-color)] border border-[var(--card-border)] rounded-xl px-4 py-3 text-xs md:text-sm font-bold text-[var(--text-main)] focus:outline-none"></select>
                </div>

                <div class="bg-[var(--bg-color)] p-6 rounded-2xl border border-[var(--card-border)] text-center mb-6">
                    <div id="quiz-congratulations" class="hidden py-6">
                        <span class="text-4xl block mb-3">🎉</span>
                        <h5 class="font-serif text-xl font-bold text-[var(--accent-color)]">이 장소의 스탬프를 획득했습니다!</h5>
                        <p class="text-xs opacity-70 mt-1">다른 장소를 선택해 퀴즈 도전을 이어가 보세요.</p>
                    </div>

                    <div id="quiz-active-area">
                        <span class="text-[10px] uppercase tracking-wider text-[var(--accent-color)] font-bold block mb-1">이 설명, 맞을까요 틀릴까요?</span>
                        <p id="quiz-statement-text" class="font-serif text-lg md:text-xl font-bold text-[var(--text-main)] leading-relaxed max-w-md mx-auto min-h-[60px] flex items-center justify-center px-2"></p>
                    </div>
                </div>

                <div id="quiz-input-area" class="flex gap-3">
                    <button onclick="checkQuizAnswer(true)" class="flex-1 bg-white border-2 border-[var(--accent-color)] text-[var(--accent-color)] hover:bg-[var(--accent-color)] hover:text-white transition-colors font-bold text-lg py-4 rounded-xl">
                        ⭕ 맞다 (O)
                    </button>
                    <button onclick="checkQuizAnswer(false)" class="flex-1 bg-white border-2 border-red-400 text-red-500 hover:bg-red-400 hover:text-white transition-colors font-bold text-lg py-4 rounded-xl">
                        ❌ 틀리다 (X)
                    </button>
                </div>
            </div>

        </div>
    </div>

    <!-- [FOOTER] -->
    <footer class="max-w-4xl mx-auto text-center px-6 py-12 border-t border-[var(--text-main)]/10 mt-16">
        <p class="font-serif text-lg font-bold">"나의 오래된 전주가 당신에게도 좋은 쉼표가 되기를."</p>
    </footer>

    <!-- [MODAL DIALOG (알림 팝업)] -->
    <div id="info-modal" class="fixed inset-0 z-50 bg-black/60 hidden flex items-center justify-center p-4">
        <div class="bg-white text-gray-800 rounded-2xl max-w-md w-full p-6 shadow-2xl relative transform transition-all duration-300 scale-95 opacity-0" id="modal-content">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 focus:outline-none text-xl">
                ✕
            </button>
            <div id="modal-body-content"></div>
            <div class="mt-6 pt-4 border-t border-gray-100 flex justify-end">
                <button onclick="closeModal()" class="bg-[#1B2A20] text-white px-5 py-2 rounded-lg text-xs font-semibold hover:bg-[#4E8752] transition-colors">
                    전주 가이드 닫기
                </button>
            </div>
        </div>
    </div>

    <script src="modal.js"></script>
    <script>
        // --- 스탬프 투어 (Stamp Tour) 핵심 로직 ---
        const stampSpots = [
            { id: 'spot1', name: "한옥마을", statement: "한옥마을은 덕진구 일대에 자리 잡은 골목이다.", answer: false },
            { id: 'spot2', name: "완산벙커", statement: "완산벙커 더 스페이스는 옛 군사 방공호 터널을 재해석한 미디어아트 전시공간이다.", answer: true },
            { id: 'spot3', name: "덕진공원", statement: "덕진공원 호수 한가운데에는 한옥 양식의 도서관인 연화정이 자리하고 있다.", answer: true },
            { id: 'spot4', name: "객리단길", statement: "객리단길은 한복거리와 웨딩거리가 밀집한 것으로 유명한 골목이다.", answer: false },
            { id: 'spot5', name: "웨리단길", statement: "웨리단길에는 화려한 빛의 향연을 자랑하는 대형 동굴 미디어아트 전시관이 있다.", answer: false },
            { id: 'spot6', name: "아중호수도서관", statement: "아중호수도서관은 호수 위에 떠 있는 듯한 모습으로 지어진 수상 도서관이다.", answer: true },
            { id: 'spot7', name: "팔복예술공장", statement: "팔복예술공장은 원래 카세트테이프를 생산하던 공장이었다.", answer: true },
            { id: 'spot8', name: "세병공원", statement: "세병공원은 완산구 교동에 위치한 전통 한옥 양식 정원이다.", answer: false },
            { id: 'spot9', name: "전주수목원", statement: "전주수목원은 한국도로공사가 공익 목적으로 조성한 수목원이다.", answer: true }
        ];

        let earnedStamps = JSON.parse(localStorage.getItem('earnedStamps')) || [];

        function renderStampBoard(justEarnedId = null) {
            const board = document.getElementById('stamp-board');
            const progress = document.getElementById('stamp-progress');
            board.innerHTML = '';

            progress.textContent = `${earnedStamps.length} / 9 수집`;

            stampSpots.forEach((spot) => {
                const isEarned = earnedStamps.includes(spot.id);
                const isJustEarned = spot.id === justEarnedId;
                const stampCell = document.createElement('div');
                stampCell.className = `flex flex-col items-center justify-center p-4 rounded-2xl border transition-all duration-500 ${isEarned ? 'bg-emerald-50 border-emerald-200' : 'bg-gray-100 border-gray-200 opacity-50'}`;

                stampCell.innerHTML = `
                    <div class="w-14 h-14 rounded-full flex items-center justify-center border-2 border-dashed relative mb-2 ${isEarned ? 'bg-white border-emerald-400 text-emerald-600 scale-105' : 'bg-gray-200 border-gray-300 text-gray-400'}">
                        ${isEarned ? `
                            ${isJustEarned ? `
                            <svg class="w-10 h-10 stamp-ping-twice absolute opacity-60 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                            ` : ``}
                            <svg class="w-10 h-10 text-[var(--accent-color)]" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="50" cy="50" r="45" stroke="currentColor" stroke-width="4" stroke-dasharray="4 4"/>
                                <path d="M30 65 L50 35 L70 65 Z" fill="none" stroke="currentColor" stroke-width="4"/>
                                <text x="50" y="58" text-anchor="middle" font-family="Gowun Batang" font-size="11" font-weight="bold" fill="currentColor">전주</text>
                            </svg>
                        ` : `
                            <span class="text-xs font-bold font-serif">미획득</span>
                        `}
                    </div>
                    <span class="text-[10px] font-bold tracking-tight text-center ${isEarned ? 'text-emerald-900' : 'text-gray-500'}">${spot.name}</span>
                `;
                board.appendChild(stampCell);
            });
        }

        function initQuizDropdown() {
            const select = document.getElementById('quiz-spot-select');
            select.innerHTML = '';
            stampSpots.forEach(spot => {
                const isEarned = earnedStamps.includes(spot.id);
                const opt = document.createElement('option');
                opt.value = spot.id;
                opt.textContent = `${spot.name} ${isEarned ? '✅ (완료)' : '🔒 (도전 가능)'}`;
                select.appendChild(opt);
            });
        }

        function loadQuiz() {
            const select = document.getElementById('quiz-spot-select');
            const activeSpotId = select.value;
            const spot = stampSpots.find(s => s.id === activeSpotId);
            const isEarned = earnedStamps.includes(activeSpotId);

            const activeArea = document.getElementById('quiz-active-area');
            const congratsArea = document.getElementById('quiz-congratulations');
            const inputArea = document.getElementById('quiz-input-area');

            if (isEarned) {
                activeArea.classList.add('hidden');
                congratsArea.classList.remove('hidden');
                inputArea.classList.add('hidden');
            } else {
                activeArea.classList.remove('hidden');
                congratsArea.classList.add('hidden');
                inputArea.classList.remove('hidden');

                document.getElementById('quiz-statement-text').textContent = spot.statement;
            }
        }

        function checkQuizAnswer(userAnswer) {
            const select = document.getElementById('quiz-spot-select');
            const activeSpotId = select.value;
            const spot = stampSpots.find(s => s.id === activeSpotId);

            const isCorrect = userAnswer === spot.answer;

            if (isCorrect) {
                earnedStamps.push(activeSpotId);
                localStorage.setItem('earnedStamps', JSON.stringify(earnedStamps));

                openCustomAlert("🎉 정답입니다!", `<strong>${spot.name}</strong> 퀴즈를 풀고 전주 영광의 대숲 스탬프 도장을 찍었습니다.`);

                renderStampBoard(activeSpotId);
                initQuizDropdown();
                select.value = activeSpotId;
                loadQuiz();
            } else {
                openCustomAlert("😢 아쉽게도 오답입니다", "설명을 다시 한번 잘 읽어보시고, O 또는 X를 다시 선택해주세요!");
            }
        }

        function resetStampTour() {
            earnedStamps = [];
            localStorage.removeItem('earnedStamps');
            renderStampBoard();
            initQuizDropdown();
            loadQuiz();
            openCustomAlert("🧹 도감 초기화", "스탬프 투어가 처음부터 새롭게 리셋되었습니다.");
        }

        window.onload = function() {
            renderStampBoard();
            initQuizDropdown();
            loadQuiz();
        };

        function updateScrollProgress(){
            const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            const documentHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const percent = (scrollTop / documentHeight) * 100;
            document.getElementById("scroll-progress").style.width = percent + "%";
        }

        window.addEventListener("scroll", updateScrollProgress);
        window.addEventListener("load", updateScrollProgress);
        window.addEventListener("resize", updateScrollProgress);
    </script>

    <script>
        const canvas = document.getElementById("particle-bg");
        const ctx = canvas.getContext("2d");

        let particles = [];

        function resizeCanvas(){
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        resizeCanvas();
        window.addEventListener("resize", resizeCanvas);

        class Particle {
            constructor(){
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1;
                this.speedX = Math.random() * 0.4 - 0.2;
                this.speedY = Math.random() * 0.4 - 0.2;
                this.opacity = Math.random()*0.5+0.2;
            }

            update(){
                this.x += this.speedX;
                this.y += this.speedY;

                if(this.x < 0 || this.x > canvas.width)
                    this.speedX *= -1;

                if(this.y < 0 || this.y > canvas.height)
                    this.speedY *= -1;
            }

            draw(){
                ctx.beginPath();
                ctx.fillStyle = `rgba(90,160,120,${this.opacity})`;
                ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
                ctx.fill();
            }
        }

        function createParticles(){
            particles = [];
            const count = window.innerWidth < 768 ? 35 : 80;
            for(let i=0;i<count;i++){
                particles.push(new Particle());
            }
        }

        createParticles();

        function animate(){
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p=>{
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        animate();
    </script>

</body>
</html>
